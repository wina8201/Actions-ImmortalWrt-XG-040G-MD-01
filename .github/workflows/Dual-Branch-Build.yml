name: Build ImmortalWrt for XG-040G-MD (Multi-Branch)

on:
  workflow_dispatch:
    inputs:
      scope:
        description: '编译范围'
        required: true
        default: 'all_branches'
        type: choice
        options:
          - all_branches
          - master_only
          - 25.12_only
      config:
        description: '选择配置（对所选分支生效）'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - seed-01
          - seed-02
          - seed-03
          - seed-04
          - seed-05

env:
  DEVICE_NAME: XG-040G-MD
  SOURCE_REPO: https://github.com/wina8201/immortalwrt
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 强制使用 Node.js 24

jobs:
  matrix-generate:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4          # 升级到 v4
      - id: set-matrix
        run: |
          SCOPE="${{ github.event.inputs.scope }}"
          if [ "$SCOPE" = "all_branches" ]; then
            BRANCHES='["master", "25.12"]'
          elif [ "$SCOPE" = "master_only" ]; then
            BRANCHES='["master"]'
          else
            BRANCHES='["25.12"]'
          fi
          echo "matrix={\"branch\": $BRANCHES}" >> $GITHUB_OUTPUT

  build:
    needs: matrix-generate
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix: ${{ fromJSON(needs.matrix-generate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4          # 升级到 v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 python3-distutils python3-setuptools \
          rsync subversion swig time u-boot-tools unzip wget xsltproc zlib1g-dev \
          libfuse-dev

      - name: Set up variables
        id: vars
        run: |
          echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          if [ "${{ github.event.inputs.config }}" = "all" ]; then
            CONFIGS="seed-01 seed-02 seed-03 seed-04 seed-05"
          else
            CONFIGS="${{ github.event.inputs.config }}"
          fi
          echo "CONFIGS=$CONFIGS" >> $GITHUB_ENV
          echo "BRANCH=${{ matrix.branch }}" >> $GITHUB_ENV

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 --branch ${{ env.BRANCH }} $SOURCE_REPO openwrt
          cd openwrt
          echo "SOURCE_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          git clone --depth=1 https://github.com/master-0123/openwrt-printing-packages package/printing-packages
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build and release for each config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONFIG_LIST="${{ env.CONFIGS }}"
          for cfg in $CONFIG_LIST; do
            echo "========== Building branch: ${{ env.BRANCH }} | config: $cfg =========="

            cd openwrt
            make clean
            rm -f .config .config.old
            cp $GITHUB_WORKSPACE/${cfg}.config .config
            make defconfig

            # 下载依赖（单线程，避免并发问题）
            make download -j1 V=s
            # 编译，若失败打印完整日志
            make -j$(nproc) V=s 2>&1 | tee build.log || {
              echo "❌ Build failed for ${{ env.BRANCH }}/$cfg"
              tail -n 200 build.log
              exit 1
            }

            KERNEL_VER=$(make kernelversion)
            TARGET_BOARD=$(grep '^CONFIG_TARGET_BOARD=' .config | cut -d= -f2 | tr -d '"')
            cd ..

            case $cfg in
              seed-01) FEATURE="Base";;
              seed-02) FEATURE="OpenClash";;
              seed-03) FEATURE="OpenClash-KSMBD";;
              seed-04) FEATURE="OpenClash-CUPS";;
              seed-05) FEATURE="OpenClash-KSMBD-CUPS";;
            esac

            TAG_NAME="${DEVICE_NAME}-${FEATURE}-${{ env.BRANCH }}-${DATE}"
            echo "Preparing release: $TAG_NAME"

            mkdir -p release/$cfg
            find openwrt/bin/targets -name '*-squashfs-sysupgrade.bin' -exec cp {} release/$cfg/ \;
            find openwrt/bin/targets -name '*-squashfs-factory.bin' -exec cp {} release/$cfg/ \;
            cp openwrt/.config release/$cfg/build.config

            CONFIG_DESC="基础功能"
            [ "$cfg" != "seed-01" ] && CONFIG_DESC+=" OpenClash"
            [[ "$cfg" == "seed-03" || "$cfg" == "seed-05" ]] && CONFIG_DESC+=" KSMBD文件共享"
            [[ "$cfg" == "seed-04" || "$cfg" == "seed-05" ]] && CONFIG_DESC+=" CUPS打印机共享"

            NOTES_EXTRA=""
            if [[ "$cfg" == "seed-04" || "$cfg" == "seed-05" ]]; then
              NOTES_EXTRA="- 本固件集成了CUPS打印服务，集成打印机驱动为 **Epson-inkjet-printer-escpr**，仅支持Epson喷墨打印机。请确保您的打印机兼容。"
            fi

            cat > release/$cfg/release.md <<EOF
          ### 📦 构建信息
          | 项目 | 内容 |
          |------|------|
          | **设备型号** | ${DEVICE_NAME} |
          | **目标平台** | ${TARGET_BOARD} |
          | **源码分支** | ${{ env.BRANCH }} (${SOURCE_COMMIT}) |
          | **配置类型** | ${CONFIG_DESC} |
          | **源码来源** | ${SOURCE_REPO} |
          | **编译时间** | ${DATE} |
          | **内核版本** | ${KERNEL_VER} |

          ### 🗂️ 文件说明
          - \`*-squashfs-sysupgrade.bin\` → 在已有 OpenWrt/ImmortalWrt 中升级使用
          - \`*-squashfs-factory.bin\` → 从uboot首次刷机使用
          - \`build.config\` → 本次编译使用的完整配置文件

          ### 🔐 默认信息
          | 项目 | 默认值 |
          |------|--------|
          | **管理地址** | 192.168.1.1 |
          | **用户名** | root |
          | **密码** | *无（首次登录后请务必设置）* |

          ### ⚠️ 注意事项
          - 刷机前请务必核对设备型号，错误固件可能导致变砖。
          - 建议在刷机前备份原厂固件和重要数据。
          - 若固件内集成第三方插件，其安全性请自行评估。
          - 本固件为自动编译生成，请仔细核对文件完整性后再刷写。
          ${NOTES_EXTRA}
          ---
          *由 GitHub Actions 自动构建 | Release ${TAG_NAME}*
          EOF

            cd release/$cfg
            gh release delete "$TAG_NAME" -y --repo $GITHUB_REPOSITORY 2>/dev/null || true
            git push origin :refs/tags/$TAG_NAME 2>/dev/null || true
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file release.md \
              --repo $GITHUB_REPOSITORY \
              *.bin build.config
            cd ../..
          done
