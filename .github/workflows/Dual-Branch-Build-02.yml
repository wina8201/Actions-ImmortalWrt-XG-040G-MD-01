name: XG-040G-MD Dual-Branch-Build-02

on:
  workflow_dispatch:
    inputs:
      configs:
        description: |
          要编译的配置（JSON 数组格式，例如 ["seed-01","seed-02"]）
          全部编译请输入: ["seed-01","seed-02","seed-03","seed-04","seed-05"]
        required: true
        type: string
        default: '["seed-01","seed-02","seed-03","seed-04","seed-05"]'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(github.event.inputs.configs) }}
        branch: ["master-XG-040G-MD", "openwrt-25.12-XG-040G-MD"]
    env:
      REPO_URL: https://github.com/fzs209/immortalwrt.git
    steps:
      - name: Checkout actions repository
        uses: actions/checkout@v4
        with:
          path: actions-repo

      - name: Checkout ImmortalWrt source
        uses: actions/checkout@v4
        with:
          repository: fzs209/immortalwrt
          ref: ${{ matrix.branch }}
          path: immortalwrt

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3 python3-setuptools rsync unzip zlib1g-dev file wget

      - name: Copy config
        run: cp actions-repo/${{ matrix.config }}.config immortalwrt/.config

      - name: Add custom feeds and packages
        working-directory: immortalwrt
        run: |
          echo "src-git cups https://github.com/fengchen-github/openwrt-cups.git" >> feeds.conf.default
          git clone --depth=1 https://github.com/master-0123/openwrt-printing-packages package/printing-packages

      - name: Update feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Expand config
        working-directory: immortalwrt
        run: make defconfig

      - name: Get kernel version
        id: kernel
        working-directory: immortalwrt
        run: |
          KERNEL_VERSION=$(make -s kernelversion 2>/dev/null || echo "unknown")
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV

      - name: Download sources
        working-directory: immortalwrt
        run: make download -j$(nproc)

      - name: Compile firmware
        working-directory: immortalwrt
        run: make -j$(nproc) V=s

      - name: Collect artifacts
        id: collect
        run: |
          cd immortalwrt/bin/targets/*/*
          TARGET_DIR=$(pwd)
          TARGET=$(basename $(dirname $TARGET_DIR))/$(basename $TARGET_DIR)
          mkdir -p $GITHUB_WORKSPACE/artifacts

          # 重命名固件以避免分支间文件名冲突
          for f in *squashfs-sysupgrade.bin; do
            cp "$f" "$GITHUB_WORKSPACE/artifacts/${f%.bin}-${{ matrix.branch }}.bin"
          done
          for f in *squashfs-factory.bin; do
            cp "$f" "$GITHUB_WORKSPACE/artifacts/${f%.bin}-${{ matrix.branch }}.bin"
          done
          cp $GITHUB_WORKSPACE/immortalwrt/.config $GITHUB_WORKSPACE/artifacts/build-${{ matrix.branch }}.config

          COMMIT_SHA=$(cd $GITHUB_WORKSPACE/immortalwrt && git rev-parse HEAD)
          SHORT_SHA=$(cd $GITHUB_WORKSPACE/immortalwrt && git rev-parse --short HEAD)
          cat > $GITHUB_WORKSPACE/artifacts/info.txt <<EOF
          TARGET=$TARGET
          BRANCH=${{ matrix.branch }}
          COMMIT_SHA=$COMMIT_SHA
          SHORT_SHA=$SHORT_SHA
          KERNEL_VERSION=$KERNEL_VERSION
          EOF
          echo "ARTIFACT_NAME=firmware-${{ matrix.config }}-${{ matrix.branch }}" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ${{ fromJSON(github.event.inputs.configs) }}
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-${{ matrix.config }}-*
          path: release-files

      - name: Prepare release metadata
        id: meta
        run: |
          CONFIG=${{ matrix.config }}
          case $CONFIG in
            seed-01)
              FEATURE="Base"
              CONFIG_DESC="基础功能"
              ;;
            seed-02)
              FEATURE="OpenClash"
              CONFIG_DESC="基础功能 + OpenClash"
              ;;
            seed-03)
              FEATURE="OpenClash-KSMBD"
              CONFIG_DESC="基础功能 + OpenClash + KSMBD文件共享"
              ;;
            seed-04)
              FEATURE="OpenClash-CUPS"
              CONFIG_DESC="基础功能 + OpenClash + CUPS打印机共享"
              ;;
            seed-05)
              FEATURE="OpenClash-KSMBD-CUPS"
              CONFIG_DESC="基础功能 + OpenClash + KSMBD文件共享 + CUPS打印机共享"
              ;;
          esac
          DATE=$(date +%Y%m%d)
          RELEASE_TAG="XG-040G-MD-${FEATURE}-${DATE}"
          echo "FEATURE=$FEATURE" >> $GITHUB_ENV
          echo "CONFIG_DESC=$CONFIG_DESC" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Gather info and flatten assets
        run: |
          cd release-files
          PLATFORM=""
          KERNEL=""
          BRANCH_INFO=""
          for dir in firmware-*; do
            if [ -f "$dir/info.txt" ]; then
              source <(grep -E '^(TARGET|KERNEL_VERSION|BRANCH|COMMIT_SHA)=' "$dir/info.txt")
              BRANCH_INFO+="${BRANCH}:${COMMIT_SHA} "
              [ -z "$PLATFORM" ] && PLATFORM=$TARGET
              [ -z "$KERNEL" ] && KERNEL=$KERNEL_VERSION
            fi
          done
          echo "PLATFORM=$PLATFORM" >> $GITHUB_ENV
          echo "KERNEL=$KERNEL" >> $GITHUB_ENV
          echo "BRANCH_INFO=$BRANCH_INFO" >> $GITHUB_ENV

          # 只保留固件和配置文件
          mkdir -p $GITHUB_WORKSPACE/dist
          find . -type f \( -name "*.bin" -o -name "build-*.config" \) -exec cp {} $GITHUB_WORKSPACE/dist/ \;

      - name: Generate release body
        run: |
          BODY="### 📦 构建信息"$'\n'
          BODY+="| 项目 | 内容 |"$'\n'
          BODY+="|------|------|"$'\n'
          BODY+="| **设备型号** | XG-040G-MD |"$'\n'
          BODY+="| **目标平台** | ${PLATFORM:-unknown} |"$'\n'
          BODY+="| **内核版本** | ${KERNEL:-unknown} |"$'\n'
          BODY+="| **配置类型** | ${CONFIG_DESC} |"$'\n'
          BODY+="| **源码来源** | https://github.com/fzs209/immortalwrt |"$'\n'
          BODY+="| **源码分支** | $(echo $BRANCH_INFO | sed 's/ /<br>/g') |"$'\n'
          BODY+="| **编译时间** | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |"$'\n'
          BODY+=""$'\n'

          BODY+="### 🗂️ 文件说明"$'\n'
          cd $GITHUB_WORKSPACE/dist
          for f in *; do
            if [[ "$f" == *sysupgrade*.bin ]]; then
              BODY+="- \`$f\` → 在已有 OpenWrt/ImmortalWrt 中升级使用"$'\n'
            elif [[ "$f" == *factory*.bin ]]; then
              BODY+="- \`$f\` → 从uboot首次刷机使用"$'\n'
            elif [[ "$f" == build-*.config ]]; then
              BODY+="- \`$f\` → 本次编译使用的完整配置文件"$'\n'
            fi
          done
          BODY+=""$'\n'

          BODY+="### 🔐 默认信息"$'\n'
          BODY+="| 项目 | 默认值 |"$'\n'
          BODY+="|------|--------|"$'\n'
          BODY+="| **管理地址** | 192.168.1.1 |"$'\n'
          BODY+="| **用户名** | root |"$'\n'
          BODY+="| **密码** | *无（首次登录后请务必设置）* |"$'\n'
          BODY+=""$'\n'

          BODY+="### ⚠️ 注意事项"$'\n'
          BODY+="- 刷机前请务必核对设备型号，错误固件可能导致变砖。"$'\n'
          BODY+="- 建议在刷机前备份原厂固件和重要数据。"$'\n'
          BODY+="- 若固件内集成第三方插件，其安全性请自行评估。"$'\n'
          BODY+="- 本固件为自动编译生成，请仔细核对文件完整性后再刷写。"$'\n'

          if echo "$FEATURE" | grep -q "CUPS"; then
            BODY+="- 打印机共享功能集成了 **Epson-inkjet-printer-escpr** 驱动，支持部分爱普生喷墨打印机。如需其他驱动请自行添加。"$'\n'
          fi

          BODY+="---"$'\n'
          BODY+="*由 GitHub Actions 自动构建 | Release ${RELEASE_TAG}*"

          echo "$BODY" > $GITHUB_WORKSPACE/release-body.md

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: $GITHUB_WORKSPACE/release-body.md
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
